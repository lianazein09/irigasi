services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-tani_cerdas}
      MARIADB_USER: ${DB_USER:-tani_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-tani_password}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/database.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOW_ALL_ORIGINS: "False"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost}
      TIME_ZONE: ${TIME_ZONE:-Asia/Jakarta}
      DB_NAME: ${DB_NAME:-tani_cerdas}
      DB_USER: ${DB_USER:-tani_user}
      DB_PASSWORD: ${DB_PASSWORD:-tani_password}
      DB_HOST: db
      DB_PORT: 3306
      MQTT_ENABLED: "False"
    depends_on:
      db:
        condition: service_healthy

  mqtt-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: ["python", "run_mqtt.py"]
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      TIME_ZONE: ${TIME_ZONE:-Asia/Jakarta}
      DB_NAME: ${DB_NAME:-tani_cerdas}
      DB_USER: ${DB_USER:-tani_user}
      DB_PASSWORD: ${DB_PASSWORD:-tani_password}
      DB_HOST: db
      DB_PORT: 3306
      MQTT_ENABLED: "False"
      MQTT_BROKER_HOST: ${MQTT_BROKER_HOST:-broker.emqx.io}
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT:-1883}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8081}:80"
    depends_on:
      - backend

volumes:
  db_data:
